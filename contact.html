<head>

  <link rel="canonical" href="https://indirah.fr/contact.html">

  <meta property="og:image" content="https://indirah.fr/images/moryspotlight.webp">
  <meta property="og:url" content="https://indirah.fr/contact.html">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact - Indirah" data-i18n-content="meta_contact_title">
  <meta name="twitter:description" content="Contactez Indirah pour un projet artistique, une question ou une collaboration." data-i18n-content="meta_contact_desc">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="css/layout.css?v=20260707">
  <link rel="stylesheet" href="css/contact.css?v=20260707">
  <link rel="stylesheet" href="css/mory.css?v=20260707">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <header class="site-header" id="site-header">
    <div class="header-inner">

      <a href="index.html" class="brand">
        <div class="avatar-container avatar-small">
          <div class="avatar">
            <picture>
                <source srcset="images/indirahicon-small.webp" type="image/webp">
                <img src="images/indirahicon-small.webp" alt="" class="avatar-image">
              </picture>
          </div>
          <div class="avatar-badge">
            <svg viewBox="0 0 24 24" width="7" height="7" fill="none"
                 stroke="#276152" stroke-width="3"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </div>
        <span class="brand-name">Indirah</span>
      </a>

      <nav class="main-nav" aria-label="Navigation principale">
        <a href="index.html" data-i18n="nav_accueil">Accueil</a>
        <a href="oeuvres.html" data-i18n="nav_oeuvres">Oeuvres</a>
        <a href="musee.html" data-i18n="nav_musee">Musee</a>
        <a href="contact.html" data-i18n="nav_contact" class="nav-current">Contact</a>
      </nav>

      <button class="lang-toggle" id="lang-toggle" aria-label="Changer de langue">
        <span class="lang-option" data-lang="fr">FR</span>
        <span class="lang-sep">/</span>
        <span class="lang-option" data-lang="en">EN</span>
      </button>

      <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>
  </header>


  <!-- ═══════════════════════════════════════════
       BARRE DE PROGRESSION
  ═══════════════════════════════════════════ -->
  <div class="contact-progress">
    <div class="contact-progress-bar" id="progress-bar"></div>
  </div>


  <!-- ═══════════════════════════════════════════
       FORMULAIRE — une question à la fois
  ═══════════════════════════════════════════ -->
  <main class="contact-main" id="contact-main">

    <!-- Étape 1 — Nom -->
    <div class="form-step" id="step-1">
      <p class="step-counter" aria-hidden="true">01 — 03</p>
      <label class="step-question" for="input-name" data-i18n="contact_q1">
        Comment puis-je vous appeler&nbsp;?
      </label>
      <input
        type="text"
        class="step-input"
        id="input-name"
        autocomplete="name"
        data-i18n-placeholder="contact_ph1"
        placeholder="Votre nom"
      >
      <p class="step-error" id="error-name" role="alert" aria-live="polite"></p>
      <div class="step-nav">
        <button class="btn-next" id="btn-next-1" data-i18n="contact_next">Suivant</button>
      </div>
    </div>

    <!-- Étape 2 — Email -->
    <div class="form-step" id="step-2">
      <p class="step-counter" aria-hidden="true">02 — 03</p>
      <label class="step-question" for="input-email" data-i18n="contact_q2">
        Où puis-je vous répondre&nbsp;?
      </label>
      <input
        type="email"
        class="step-input"
        id="input-email"
        autocomplete="email"
        inputmode="email"
        data-i18n-placeholder="contact_ph2"
        placeholder="votre@email.com"
      >
      <p class="step-error" id="error-email" role="alert" aria-live="polite"></p>
      <div class="step-nav">
        <button class="btn-back" id="btn-back-2" data-i18n="contact_back">Retour</button>
        <button class="btn-next" id="btn-next-2" data-i18n="contact_next">Suivant</button>
      </div>
    </div>

    <!-- Étape 3 — Message -->
    <div class="form-step" id="step-3">
      <p class="step-counter" aria-hidden="true">03 — 03</p>
      <label class="step-question" for="input-message" data-i18n="contact_q3">
        Quel est votre projet&nbsp;?
      </label>
      <textarea
        class="step-input step-textarea"
        id="input-message"
        rows="1"
        data-i18n-placeholder="contact_ph3"
        placeholder="Décrivez votre projet…"
      ></textarea>
      <p class="step-error" id="error-message" role="alert" aria-live="polite"></p>
      <div class="step-nav">
        <button class="btn-back" id="btn-back-3" data-i18n="contact_back">Retour</button>
        <button class="btn-send" id="btn-send">Envoyer</button>
      </div>
    </div>

    <!-- Confirmation -->
    <div class="form-step" id="step-confirm">
      <p class="step-final-title" data-i18n="contact_success_title">Merci.</p>
      <p class="step-final-text" data-i18n="contact_success_text">
        Votre message a bien été envoyé. Je vous répondrai bientôt.
      </p>
    </div>

    <!-- Erreur -->
    <div class="form-step" id="step-error">
      <p class="step-final-title" data-i18n="contact_error_title">Oops.</p>
      <p class="step-final-text">
        <span data-i18n="contact_error_text">Une erreur est survenue. Réessayez ou écrivez-moi directement à</span>
        <!-- ⚠️  Remplacez cette adresse par l'email de contact réel de l'artiste -->
        <a href="mailto:contact@indirah.fr" class="fallback-email">contact@indirah.fr</a>.
      </p>
      <div class="step-nav" style="margin-top: 36px">
        <button class="btn-next" id="btn-retry" data-i18n="contact_retry">Réessayer</button>
      </div>
    </div>

  </main>


  <!-- Overlay sombre derrière le menu mobile -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>

  <!-- Menu mobile -->
  <nav class="mobile-menu" id="mobile-menu" aria-label="Menu mobile">
    <a href="index.html" class="mobile-menu-btn" data-i18n="nav_accueil">Accueil</a>
    <a href="oeuvres.html" class="mobile-menu-btn" data-i18n="nav_oeuvres">Oeuvres</a>
    <a href="musee.html" class="mobile-menu-btn" data-i18n="nav_musee">Musee</a>
    <a href="contact.html" class="mobile-menu-btn" data-i18n="nav_contact">Contact</a>
    <div class="mobile-menu-btn mobile-menu-lang" id="mobile-menu-lang">
      <span class="lang-option" data-lang="fr">FR</span>
      <span class="lang-sep">/</span>
      <span class="lang-option" data-lang="en">EN</span>
    </div>
    <button class="mobile-menu-close" id="mobile-menu-close" aria-label="Fermer le menu">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
           stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </nav>

</body>
</html>
