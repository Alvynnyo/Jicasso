<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oeuvres — Indirah</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/oeuvres.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <header class="site-header" id="site-header">
    <div class="header-inner">

      <a href="index.html" class="brand">
        <div class="avatar-container avatar-small">
          <div class="avatar">
            <img src="images/indirahicon.png" alt="" class="avatar-image">
          </div>
          <div class="avatar-badge">
            <svg viewBox="0 0 24 24" width="7" height="7" fill="none"
                 stroke="#276152" stroke-width="3"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </div>
        <span class="brand-name">Indirah</span>
      </a>

      <nav class="main-nav" aria-label="Navigation principale">
        <a href="oeuvres.html" data-i18n="nav_oeuvres" class="nav-current">Oeuvres</a>
        <a href="index.html#atelier" data-i18n="nav_atelier">Atelier</a>
        <a href="contact.html" data-i18n="nav_contact">Contact</a>
      </nav>

      <button class="lang-toggle" id="lang-toggle" aria-label="Changer de langue">
        <span class="lang-option" data-lang="fr">FR</span>
        <span class="lang-sep">/</span>
        <span class="lang-option" data-lang="en">EN</span>
      </button>

      <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>
  </header>


  <!-- ═══════════════════════════════════════════
       CONTENU PRINCIPAL
  ═══════════════════════════════════════════ -->
  <main class="oeuvres-main">

    <!-- Série I -->
    <section class="ov-serie">
      <div class="ov-serie-divider" role="separator"></div>
      <div class="ov-serie-inner">

        <div class="ov-serie-info">
          <h2 class="serie-title" data-i18n="serie1_title">Série I</h2>
          <p class="serie-text" data-i18n="serie1_text">
            Paysages et lumière. Une exploration des saisons et de leurs couleurs.
          </p>
        </div>

        <div class="ov-serie-content">
          <div class="serie-video-card" data-serie="serie1">
            <img src="images/serie-1/mory.png" alt="" loading="lazy">
            <div class="play-btn" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                <polygon points="6,3 20,12 6,21"/>
              </svg>
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>


  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <a href="index.html" class="footer-logo">Indirah</a>
      <nav class="footer-links" aria-label="Liens externes">
        <a href="#" data-i18n="footer_instagram">Instagram</a>
        <a href="#" data-i18n="footer_artsy">Artsy</a>
        <a href="contact.html" data-i18n="footer_contact">Contact</a>
      </nav>
      <p class="footer-copy" data-i18n="footer_copy">© 2024 Indirah. Tous droits réservés.</p>
    </div>
  </footer>


  <!-- ═══════════════════════════════════════════
       SÉQUENCE OVERLAY — "Une nuit au musée"
  ═══════════════════════════════════════════ -->
  <div class="seq-overlay" id="seq-overlay">

    <!-- Fermeture — sur l'overlay (hors du cadre centré) -->
    <button class="seq-close" id="seq-close" aria-label="Fermer">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <!-- Cadre centré style "YouTube" — contient toutes les étapes -->
    <div class="seq-frame" id="seq-frame">

      <!-- Étape 1 : Lecteur vidéo personnalisé -->
      <div class="seq-step seq-step--video" id="seq-step-video">
        <div class="video-player-container" id="video-player-container">

          <video class="video-player-element" id="seq-video" muted playsinline>
            <source src="" type="video/mp4">
          </video>

          <!-- Contrôles glassmorphism -->
          <div class="video-controls" id="video-controls">
            <div class="video-progress-bar" id="video-progress-bar">
              <div class="video-progress-fill" id="video-progress-fill"></div>
            </div>
            <div class="video-controls-row">

              <div class="video-controls-left">
                <button class="video-btn video-play-pause" id="video-play-pause" aria-label="Lecture"></button>
                <button class="video-btn video-volume-btn" id="video-volume-btn" aria-label="Volume"></button>
                <input type="range" class="video-volume-slider" id="video-volume-slider"
                       min="0" max="1" step="0.05" value="1">
                <span class="video-time" id="video-time">0:00 / 0:00</span>
              </div>

              <div class="video-controls-right">
                <div class="video-settings-wrap" id="video-settings-wrap">
                  <div class="video-settings-menu" id="video-settings-menu" hidden>
                    <button class="video-speed-btn active" data-speed="1">1×</button>
                    <button class="video-speed-btn" data-speed="1.5">1.5×</button>
                    <button class="video-speed-btn" data-speed="0.5">0.5×</button>
                    <button class="video-speed-btn" data-speed="2">2×</button>
                  </div>
                  <button class="video-btn video-settings-btn" id="video-settings-btn" aria-label="Vitesse"></button>
                </div>
                <button class="video-btn video-fullscreen-btn" id="video-fullscreen-btn" aria-label="Plein écran"></button>
              </div>

            </div>
          </div>

        </div>
      </div>

      <!-- Étape 2 : "Mais, où sont-elles ?" -->
      <div class="seq-step seq-step--dark" id="seq-step-intro-text">
        <p class="seq-blur-text" id="seq-intro-text"></p>
      </div>

      <!-- Étapes 3-5 : Reveal des tableaux (style musée) -->
      <div class="seq-step seq-step--painting" id="seq-step-painting">
        <div class="seq-painting-inner" id="seq-painting-inner">
          <div class="seq-painting-left">
            <p class="seq-painting-label" id="seq-painting-label">RECHERCHE</p>
            <div class="seq-painting-frame">
              <img class="seq-painting-img" id="seq-painting-img" src="" alt="">
            </div>
          </div>
          <div class="seq-painting-meta">
            <p class="seq-painting-title" id="seq-painting-title"></p>
            <p class="seq-painting-technique" id="seq-painting-technique"></p>
            <p class="seq-painting-reward" id="seq-painting-reward">RÉCOMPENSE : INESTIMABLE</p>
          </div>
        </div>
      </div>

      <!-- Étape 6 : Punchline finale -->
      <div class="seq-step seq-step--dark seq-step--outro" id="seq-step-outro">
        <p class="seq-blur-text seq-outro-text" id="seq-outro-text"></p>
        <p class="seq-signature" id="seq-signature">Indirah</p>
        <button class="seq-replay" id="seq-replay" data-i18n="seq_replay">Revoir</button>
      </div>

    </div><!-- /.seq-frame -->

  </div><!-- /.seq-overlay -->


  <!-- Overlay sombre derrière le menu mobile -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>

  <!-- Menu mobile -->
  <nav class="mobile-menu" id="mobile-menu" aria-label="Menu mobile">
    <a href="index.html" class="mobile-menu-btn" data-i18n="nav_home">Accueil</a>
    <a href="contact.html" class="mobile-menu-btn" data-i18n="nav_contact">Contact</a>
    <div class="mobile-menu-btn mobile-menu-lang" id="mobile-menu-lang">
      <span class="lang-option" data-lang="fr">FR</span>
      <span class="lang-sep">/</span>
      <span class="lang-option" data-lang="en">EN</span>
    </div>
    <button class="mobile-menu-close" id="mobile-menu-close" aria-label="Fermer le menu">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
           stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </nav>

  <script src="js/translations.js"></script>
  <script src="js/oeuvres.js"></script>
</body>
</html>
